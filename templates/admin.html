<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
        th { background: #333; color: #00ffcc; }
        .btn { padding: 5px 10px; background: #ff00ff; color: #fff; text-decoration: none; border-radius: 3px; }
    </style>
</head>
<body>
    <h2>🛠️ Owner Dashboard</h2>
    <table>
        <tr>
            <th>Email</th>
            <th>API Key</th>
            <th>Status</th>
            <th>Plays</th>
            <th>UTR</th>
            <th>Action</th>
        </tr>
        {% for u in users %}
        <tr>
            <td>{{ u.email }}</td>
            <td style="font-family: monospace;">{{ u.api_key }}</td>
            <td style="color: {% if u.status == 'pending' %}yellow{% elif u.status == 'active' %}#00ffcc{% else %}#aaa{% endif %};">{{ u.status.upper() }}</td>
            <td>{{ u.play_count }}</td>
            <td>{{ u.utr_number }}</td>
            <td>
                {% if u.status == 'pending' %}
                    <a href="/approve/{{ u.email }}?pwd={{ pwd }}" class="btn">Approve ✅</a>
                {% else %}
                    Done
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
