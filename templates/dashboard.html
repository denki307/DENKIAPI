<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{background-color:#09090b;} .glass{background:#111114; border:1px solid #27272a;}</style>
</head>
<body class="text-zinc-300 h-screen flex flex-col md:flex-row overflow-hidden">

    <div class="md:hidden flex justify-between items-center bg-zinc-950 border-b border-zinc-800 p-4 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-cyan-500 text-black font-black w-8 h-8 flex items-center justify-center rounded">D</div>
            <span class="font-bold text-white">Dashboard</span>
        </div>
        <div class="flex gap-5 text-xl">
            <a href="/billing"><i class="fa-solid fa-wallet"></i></a>
            <a href="/plans"><i class="fa-solid fa-bolt text-fuchsia-500"></i></a>
        </div>
    </div>

    <aside class="bg-zinc-950 w-64 border-r border-zinc-800 hidden md:flex flex-col shrink-0">
        <div class="p-8 border-b border-zinc-800 flex items-center gap-3">
            <div class="bg-cyan-500 text-black font-black w-10 h-10 rounded text-xl flex items-center justify-center">D</div>
            <h1 class="text-white font-bold">Denki API</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/dashboard" class="flex items-center gap-3 px-4 py-3 bg-zinc-900 text-cyan-400 rounded-xl font-medium"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="/billing" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-900 rounded-xl transition"><i class="fa-solid fa-wallet"></i> Billing</a>
            <a href="/plans" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-900 rounded-xl transition"><i class="fa-solid fa-cube"></i> Upgrade</a>
        </nav>
        <div class="p-6 border-t border-zinc-800 flex justify-between items-center">
            <span class="text-sm font-bold text-white"><i class="fa-solid fa-user-circle mr-2 text-cyan-500"></i> {{ user.username }}</span>
            <a href="/logout" class="text-zinc-600 hover:text-red-500"><i class="fa-solid fa-power-off"></i></a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-10 space-y-6">
        <div class="max-w-4xl mx-auto space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass rounded-3xl p-8 relative overflow-hidden">
                    <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-2">Wallet Balance</p>
                    <h2 class="text-6xl font-black text-white mb-6">₹{{ user.balance }}</h2>
                    <a href="/billing" class="bg-cyan-500 text-black font-bold px-6 py-3 rounded-xl hover:bg-cyan-400 transition">Add Balance</a>
                </div>

                <div class="glass rounded-3xl p-8">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Active Plan</span>
                        <span class="bg-cyan-500/20 text-cyan-400 text-[10px] px-2 py-1 rounded-full font-bold uppercase">Live Tracking</span>
                    </div>
                    <h2 class="text-3xl font-black text-white mb-1">{{ user.plan_name }}</h2>
                    <p class="text-xs text-fuchsia-500 font-bold mb-6">{{ days_left }}</p>
                    
                    <div class="flex justify-between text-xs mb-2">
                        <span>Today's Usage</span><span>{{ user.play_count }} / {{ user.max_limit }}</span>
                    </div>
                    <div class="w-full bg-zinc-800 rounded-full h-1.5 overflow-hidden">
                        <div class="bg-cyan-500 h-full shadow-[0_0_15px_rgba(34,211,238,0.5)]" style="width: {{ (user.play_count / user.max_limit * 100) if user.max_limit > 0 else 0 }}%"></div>
                    </div>
                </div>
            </div>

            <div class="glass rounded-3xl p-8">
                <h3 class="font-bold text-white mb-4"><i class="fa-solid fa-key text-cyan-500 mr-2"></i> Your License Key</h3>
                <div class="bg-black/50 border border-zinc-800 rounded-2xl p-2 flex items-center justify-between">
                    <input type="password" id="key" value="{{ user.api_key }}" class="bg-transparent font-mono text-cyan-400 outline-none w-full px-4 text-xl" readonly>
                    <div class="flex gap-2">
                        <button onclick="toggleKey()" class="p-4 text-zinc-500"><i id="eye-icon" class="fa-solid fa-eye"></i></button>
                        <button onclick="copyKey()" id="copy-btn" class="bg-zinc-800 p-4 rounded-xl text-white"><i class="fa-regular fa-copy"></i></button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function toggleKey() {
            const f = document.getElementById('key'); const i = document.getElementById('eye-icon');
            if(f.type==="password"){f.type="text"; i.className="fa-solid fa-eye-slash";}
            else{f.type="password"; i.className="fa-solid fa-eye";}
        }
        function copyKey() {
            const f = document.getElementById('key'); const b = document.getElementById('copy-btn');
            f.type='text'; navigator.clipboard.writeText(f.value).then(()=>{
                b.innerHTML = '<i class="fa-solid fa-check text-cyan-500"></i>';
                f.type='password'; setTimeout(()=>b.innerHTML='<i class="fa-regular fa-copy"></i>',2000);
            });
        }
    </script>
</body>
</html>
