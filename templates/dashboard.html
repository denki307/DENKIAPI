<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#09090b] text-zinc-300 min-h-screen">
    <nav class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 sticky top-0 z-50">
        <div class="flex items-center gap-2"><div class="bg-cyan-500 text-black font-black px-3 py-1 rounded">D</div><span class="font-bold text-white">Denki API</span></div>
        <div class="flex gap-6"><a href="/billing"><i class="fa-solid fa-wallet text-xl"></i></a><a href="/plans"><i class="fa-solid fa-bolt text-fuchsia-500 text-xl"></i></a><a href="/logout"><i class="fa-solid fa-power-off text-zinc-500 text-xl"></i></a></div>
    </nav>
    <main class="p-5 max-w-4xl mx-auto space-y-6 mt-4">
        <p class="text-xs font-bold text-zinc-500 uppercase">Welcome, {{ user.username }} ({{ user.email }})</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-[#111114] border border-zinc-800 rounded-3xl p-8 shadow-xl">
                <p class="text-xs text-zinc-500 font-bold uppercase mb-2">Wallet Balance</p>
                <h2 class="text-5xl font-black text-white">₹{{ user.balance }}</h2>
            </div>
            <div class="bg-[#111114] border border-zinc-800 rounded-3xl p-8 shadow-xl">
                <div class="flex justify-between mb-4"><span class="text-xs text-zinc-500 font-bold uppercase">Plan: {{ user.plan_name }}</span><span class="text-xs text-fuchsia-500 font-bold">{{ days_left }}</span></div>
                <div class="flex justify-between text-xs mb-2"><span>Daily Usage</span><span>{{ user.play_count }} / {{ user.max_limit }}</span></div>
                <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden"><div class="bg-cyan-500 h-full shadow-[0_0_10px_#22d3ee]" style="width: {{ (user.play_count/user.max_limit*100) if user.max_limit > 0 else 0 }}%"></div></div>
            </div>
        </div>
        <div class="bg-[#111114] border border-zinc-800 rounded-3xl p-8">
            <h3 class="font-bold text-white mb-4"><i class="fa-solid fa-key text-cyan-500 mr-2"></i> API License Key</h3>
            <div class="bg-black border border-zinc-800 rounded-2xl p-2 flex items-center justify-between">
                <input type="password" id="k" value="{{ user.api_key }}" class="bg-transparent text-cyan-400 font-mono w-full outline-none px-4 text-lg" readonly>
                <button onclick="copyKey()" class="bg-zinc-800 text-white p-3 rounded-xl"><i class="fa-regular fa-copy"></i></button>
            </div>
        </div>
    </main>
    <script>function copyKey(){const i=document.getElementById('k'); i.type='text'; i.select(); document.execCommand('copy'); i.type='password'; alert('Copied!');}</script>
</body>
</html>
