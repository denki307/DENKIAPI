<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Denki API Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #09090b; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="text-zinc-300 flex flex-col items-center justify-center h-screen overflow-hidden relative">
    
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-cyan-500/20 rounded-full blur-[120px] -z-10"></div>

    <div class="text-center px-6 z-10">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-zinc-900 border border-zinc-800 text-xs text-cyan-400 mb-6">
            <span class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span> v2.0 Platform Live
        </div>
        
        <h1 class="text-6xl md:text-8xl font-black text-white mb-6 tracking-tight">
            DENKI <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">API</span>
        </h1>
        <p class="text-zinc-400 text-lg md:text-xl mb-10 max-w-xl mx-auto">
            High-performance infrastructure for Music Bots. Scale your Discord server without limits.
        </p>
        
        <a href="/get_started" class="inline-flex items-center justify-center gap-3 bg-cyan-500 hover:bg-cyan-400 text-zinc-950 px-8 py-4 rounded-xl font-bold text-lg transition-all shadow-[0_0_30px_rgba(34,211,238,0.4)] hover:shadow-[0_0_50px_rgba(34,211,238,0.6)] transform hover:-translate-y-1">
            Get Started <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>
</body>
</html>
