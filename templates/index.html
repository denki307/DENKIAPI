<!DOCTYPE html>
<html lang="en">
<head>
    <title>Denki API Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 flex flex-col items-center justify-center h-screen text-zinc-300">
    <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-4 text-center">API PLATFORM</h1>
    <p class="text-zinc-500 mb-8 text-lg text-center">High-performance infrastructure for your Music Bots.</p>
    
    <form action="/get_key" method="POST" id="genForm">
        <button type="submit" id="genBtn" class="bg-cyan-500 hover:bg-cyan-400 text-zinc-950 font-bold text-xl py-4 px-8 rounded-lg shadow-[0_0_20px_rgba(34,211,238,0.4)] transition-all transform hover:scale-105">
            GENERATE FREE KEY
        </button>
    </form>
    <script>
        document.getElementById("genForm").addEventListener("submit", function() {
            var btn = document.getElementById("genBtn");
            btn.innerText = "INITIALIZING... ⏳";
            btn.classList.replace("bg-cyan-500", "bg-fuchsia-500");
            btn.style.pointerEvents = "none";
        });
    </script>
</body>
</html>
