<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#09090b] text-zinc-300">
    <nav class="p-4 border-b border-zinc-800 flex items-center gap-4 bg-zinc-950 sticky top-0"><a href="/dashboard"><i class="fa-solid fa-arrow-left"></i></a><h1 class="font-bold text-white">Upgrade Plan</h1></nav>
    <main class="p-5 max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <h1 class="text-2xl font-black text-white">Select Plan</h1>
            <div class="text-right"><p class="text-xs text-zinc-500">Balance</p><p class="text-2xl font-black text-cyan-400">₹{{ user.balance }}</p></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            {% for id, p in plans.items() %}
            <div class="bg-[#111114] border {{ 'border-cyan-500 ring-4 ring-cyan-500/10' if id == 'basic' else 'border-zinc-800' }} rounded-3xl p-8 flex flex-col">
                <h3 class="text-white text-2xl font-black mb-4">{{ p.name }}</h3>
                <div class="flex items-end gap-1 mb-6"><span class="text-5xl font-black text-white">₹{{ p.price }}</span><span class="text-zinc-600 text-sm">/30d</span></div>
                <ul class="space-y-4 mb-8 flex-1 text-sm text-zinc-400"><li><i class="fa-solid fa-check text-cyan-500 mr-2"></i> {{ p.limit }} req/day</li></ul>
                {% if user.balance >= p.price %}
                <a href="/buy_plan/{{ id }}" onclick="return confirm('Deduct ₹{{ p.price }}?')" class="block text-center py-4 rounded-2xl bg-cyan-500 text-black font-black">BUY NOW</a>
                {% else %}
                <a href="/billing" class="block text-center py-4 rounded-2xl bg-zinc-800 text-zinc-500 font-bold border border-zinc-700">RECHARGE</a>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
