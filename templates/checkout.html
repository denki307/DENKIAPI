<!DOCTYPE html>
<html lang="en">
<head>
    <title>Checkout | Denki API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-300 h-screen flex items-center justify-center p-4">

    <div class="bg-[#18181b] border border-zinc-800 rounded-2xl p-8 w-full max-w-md shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-zinc-100">Upgrade to {{ plan.name }}</h1>
            <p class="text-zinc-500 text-sm mt-1">Complete your payment to activate.</p>
        </div>

        <div class="bg-zinc-950 border border-cyan-500/30 rounded-xl p-6 text-center mb-6">
            <p class="text-xs text-cyan-400 font-bold uppercase tracking-widest mb-2">Amount to Pay</p>
            <p class="text-5xl font-black text-white mb-6">₹{{ plan.price }}</p>
            
            <div class="bg-white p-2 rounded-xl inline-block mx-auto mb-2">
                <img src="{{ qr_url }}" alt="UPI QR Code" class="w-40 h-40">
            </div>
            <p class="text-xs text-zinc-500 mt-2">Scan with GPay, PhonePe, or Paytm</p>
        </div>

        <form action="/process_payment" method="POST">
            <input type="hidden" name="plan_id" value="{{ plan_id }}">
            <div class="mb-6">
                <label class="block text-xs text-zinc-400 font-semibold mb-2 uppercase tracking-wide">Enter 12-Digit UTR Number</label>
                <input type="number" name="utr_number" required placeholder="e.g. 312345678901" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-4 text-white outline-none focus:border-cyan-500 transition font-mono text-lg">
            </div>
            
            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-zinc-950 font-bold py-4 rounded-lg transition shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                Submit Payment Details
            </button>
            <a href="/plans" class="block text-center mt-4 text-sm text-zinc-500 hover:text-white transition">Cancel & Go Back</a>
        </form>
    </div>

</body>
</html>
