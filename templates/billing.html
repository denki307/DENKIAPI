<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#09090b] text-zinc-300">
    <nav class="p-4 border-b border-zinc-800 flex items-center gap-4 bg-zinc-950 sticky top-0"><a href="/dashboard"><i class="fa-solid fa-arrow-left"></i></a><h1 class="font-bold text-white">Add Balance</h1></nav>
    <main class="p-5 max-w-4xl mx-auto space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-[#111114] border border-zinc-800 rounded-3xl p-8 text-center flex flex-col items-center">
                <div class="bg-white p-3 rounded-2xl mb-4"><img src="{{ qr_url }}" class="w-48 h-48"></div>
                <p class="text-xs text-zinc-500 font-bold mb-1 uppercase">Scan to Pay</p>
                <p class="font-mono text-cyan-400 text-lg">denkielangokey@fam</p>
            </div>
            <div class="bg-[#111114] border border-zinc-800 rounded-3xl p-8">
                <form action="/billing" method="POST" class="space-y-6">
                    <input type="number" name="amount" required placeholder="Amount (₹)" class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-white outline-none">
                    <input type="number" name="utr" required placeholder="12-Digit UTR" class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-white outline-none font-mono">
                    <button type="submit" class="w-full bg-cyan-500 text-black font-bold py-4 rounded-2xl">SUBMIT UTR</button>
                </form>
            </div>
        </div>
        <div class="bg-[#111114] border border-zinc-800 rounded-3xl overflow-hidden mt-6">
            <table class="w-full text-sm text-left">
                <thead class="bg-zinc-900 text-zinc-500"><tr><th class="p-4">Details</th><th class="p-4 text-right">Status</th></tr></thead>
                <tbody class="divide-y divide-zinc-800">
                    {% for t in txs %}
                    <tr><td class="p-4"><p class="text-white font-bold">₹{{ t.amount }}</p><p class="text-xs text-zinc-500 mt-1">{{ t.date }} • UTR: {{ t.utr }}</p></td><td class="p-4 text-right"><span class="px-2 py-1 rounded text-[10px] font-bold uppercase {{ 'bg-green-500/10 text-green-400' if t.status == 'approved' else 'bg-yellow-500/10 text-yellow-400' if t.status == 'pending' else 'bg-red-500/10 text-red-400' }}">{{ t.status }}</span></td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
