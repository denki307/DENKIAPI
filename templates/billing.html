<!DOCTYPE html>
<html lang="en">
<head>
    <title>Billing | Denki API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { background-color: #09090b; } .glass { background: #18181b; border: 1px solid #27272a; } </style>
</head>
<body class="text-zinc-300 h-screen flex overflow-hidden">

    <aside class="bg-zinc-950 w-64 border-r border-zinc-800 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
            <div class="bg-cyan-500 text-zinc-950 font-black w-10 h-10 rounded flex items-center justify-center text-xl">D</div>
            <div>
                <h1 class="text-zinc-100 font-bold">API Platform</h1>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/dashboard" class="flex items-center gap-3 px-3 py-2 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 rounded-md transition"><i class="fa-solid fa-border-all w-5"></i> Dashboard</a>
            <a href="/billing" class="flex items-center gap-3 px-3 py-2 bg-zinc-800 text-cyan-400 rounded-md font-medium"><i class="fa-regular fa-credit-card w-5"></i> Billing</a>
            <a href="/plans" class="flex items-center gap-3 px-3 py-2 text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 rounded-md transition"><i class="fa-solid fa-bolt w-5"></i> Upgrade</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <div class="max-w-3xl mx-auto space-y-6">
            
            <h1 class="text-2xl font-bold text-zinc-100 mb-6">Billing & Invoices</h1>

            <div class="glass rounded-xl p-6">
                <h2 class="text-lg font-semibold text-zinc-100 mb-4"><i class="fa-solid fa-clock-rotate-left text-fuchsia-500 mr-2"></i> Subscription History</h2>
                <div class="space-y-4">
                    
                    <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-4 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-cyan-500/10 text-cyan-500 flex items-center justify-center text-lg">
                                <i class="fa-solid fa-arrow-down"></i>
                            </div>
                            <div>
                                <div class="flex gap-2 items-center">
                                    <h3 class="text-zinc-100 font-bold">Free</h3>
                                    <span class="bg-cyan-500/20 text-cyan-400 text-[10px] px-2 rounded-full font-bold">ACTIVE</span>
                                </div>
                                <p class="text-xs text-zinc-500">Current Plan • 150 req/day</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-4 flex items-center justify-between opacity-70">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-fuchsia-500/10 text-fuchsia-500 flex items-center justify-center text-lg">
                                <i class="fa-solid fa-arrow-up"></i>
                            </div>
                            <div>
                                <div class="flex gap-2 items-center">
                                    <h3 class="text-zinc-100 font-bold">Basic</h3>
                                    <span class="bg-zinc-800 text-zinc-400 text-[10px] px-2 rounded-full font-bold">CANCELLED</span>
                                </div>
                                <p class="text-xs text-zinc-500">8 Mar 2026 - 7 Apr 2026</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-fuchsia-400">Paid:</p>
                            <p class="font-bold text-zinc-100">₹29.70</p>
                        </div>
                    </div>

                </div>
            </div>

            <div class="glass rounded-xl p-6">
                <h2 class="text-lg font-semibold text-zinc-100 mb-4"><i class="fa-solid fa-wallet text-cyan-400 mr-2"></i> Payment History</h2>
                <div class="bg-zinc-950 border border-zinc-800 rounded-lg overflow-hidden">
                    <table class="w-full text-sm text-left">
                        <thead class="text-xs text-zinc-500 bg-zinc-900/50 border-b border-zinc-800">
                            <tr><th class="px-4 py-3">Date</th><th class="px-4 py-3">Plan</th><th class="px-4 py-3 text-right">Amount</th></tr>
                        </thead>
                        <tbody class="text-zinc-300">
                            <tr class="border-b border-zinc-800 hover:bg-zinc-900">
                                <td class="px-4 py-3">8 Mar 2026</td><td class="px-4 py-3 font-semibold">Basic</td><td class="px-4 py-3 text-right font-mono">₹29.70</td>
                            </tr>
                            <tr class="hover:bg-zinc-900">
                                <td class="px-4 py-3">5 Feb 2026</td><td class="px-4 py-3 font-semibold">Basic</td><td class="px-4 py-3 text-right font-mono">₹49.50</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
