<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{background-color:#09090b;} .glass{background:#111114; border:1px solid #27272a;}</style>
</head>
<body class="text-zinc-300 h-screen flex flex-col md:flex-row">
    
    <div class="md:hidden flex items-center bg-zinc-950 border-b border-zinc-800 p-4 sticky top-0 z-50">
        <a href="/dashboard" class="mr-4"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 class="font-bold text-white">Add Balance</h1>
    </div>

    <aside class="bg-zinc-950 w-64 border-r border-zinc-800 hidden md:flex flex-col shrink-0">
        <div class="p-8 border-b border-zinc-800"><h1 class="text-white font-bold">Denki API</h1></div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/dashboard" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:bg-zinc-900 rounded-xl transition"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="/billing" class="flex items-center gap-3 px-4 py-3 bg-zinc-900 text-cyan-400 rounded-xl font-medium"><i class="fa-solid fa-wallet"></i> Billing</a>
            <a href="/plans" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:bg-zinc-900 rounded-xl transition"><i class="fa-solid fa-cube"></i> Upgrade</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-10">
        <div class="max-w-4xl mx-auto space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass rounded-3xl p-10 text-center flex flex-col items-center">
                    <div class="bg-white p-4 rounded-3xl mb-4"><img src="{{ qr_url }}" class="w-48 h-48"></div>
                    <p class="text-xs text-zinc-500 font-bold mb-1 uppercase tracking-widest">Scan with Any UPI App</p>
                    <p class="font-mono text-cyan-400 text-lg">denkielangokey@fam</p>
                </div>

                <div class="glass rounded-3xl p-8 flex flex-col justify-center">
                    <form action="/billing" method="POST" class="space-y-6">
                        <div>
                            <label class="block text-xs text-zinc-500 font-bold uppercase mb-2">Amount Paid (₹)</label>
                            <input type="number" name="amount" required class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-white outline-none focus:border-cyan-500 text-xl font-bold">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-500 font-bold uppercase mb-2">12-Digit UTR Number</label>
                            <input type="number" name="utr" required class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-white outline-none focus:border-cyan-500 font-mono">
                        </div>
                        <button type="submit" class="w-full bg-cyan-500 text-black font-bold py-5 rounded-2xl shadow-[0_0_20px_rgba(34,211,238,0.3)]">SUBMIT FOR APPROVAL</button>
                    </form>
                </div>
            </div>

            <h3 class="text-xl font-bold text-white mb-4">Recharge History</h3>
            <div class="glass rounded-3xl overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="bg-zinc-900 border-b border-zinc-800 text-zinc-500 text-left">
                        <tr><th class="px-6 py-4 font-bold uppercase tracking-widest">Details</th><th class="px-6 py-4 font-bold uppercase tracking-widest text-right">Status</th></tr>
                    </thead>
                    <tbody class="divide-y divide-zinc-800">
                        {% for t in txs %}
                        <tr>
                            <td class="px-6 py-5">
                                <p class="text-white font-bold text-lg">₹{{ t.amount }}</p>
                                <p class="text-[10px] font-mono text-zinc-500 mt-1">{{ t.date }} • UTR: {{ t.utr }}</p>
                            </td>
                            <td class="px-6 py-5 text-right">
                                <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase {{ 'bg-green-500/10 text-green-400' if t.status == 'approved' else 'bg-yellow-500/10 text-yellow-400' if t.status == 'pending' else 'bg-red-500/10 text-red-400' }}">{{ t.status }}</span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
